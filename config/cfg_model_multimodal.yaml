# 多模态模型配置示例
# 用于配置 qwen3.5-plus 等多模态模型

llm:
  # 使用 dashscope 服务
  service: dashscope

  # 多模态模型名称
  model: qwen3.5-plus

  # DashScope API Key
  # 也可以通过环境变量 DASHSCOPE_API_KEY 设置
  dashscope_api_key:

  # DashScope 兼容模式 endpoint
  modelscope_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

# 生成配置
generation_config:
  temperature: 0.7
  top_k: 50
  top_p: 0.8
  max_tokens: 2048
  stream: true

  # 禁用思考模式（可选）
  extra_body:
    enable_thinking: false

# 系统提示词
prompt:
  system: |
    你是一个多模态助手，能够理解和分析图片内容。

    当用户发送图片时，请仔细观察图片内容，并提供：
    1. 图片中的主要元素和对象
    2. 场景描述（如适用）
    3. 任何文字信息（如图片中包含文字）
    4. 颜色、布局等视觉特征

    请用用户相同的语言回答。

# 最大对话轮次
max_chat_round: 10

# 回调函数
callbacks:
  - input_callback

# 工具配置（多模态对话通常不需要工具）
tools:

help: |
  多模态模型配置示例
  使用方法:
  1. 设置 DASHSCOPE_API_KEY 环境变量
  2. 使用此配置运行多模态对话
